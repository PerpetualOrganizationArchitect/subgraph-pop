  #   network: hoodi
  #   source:
  #     address: "0x0000000000000000000000000000000000000000" # TODO: Add Beacon contract address
  #     abi: Beacon
  #     startBlock: 1429671
  #   mapping:
  #     kind: ethereum/events
  #     apiVersion: 0.0.9
  #     language: wasm/assemblyscript
  #     entities:
  #       - BeaconUpgrade
  #     abis:
  #       - name: Beacon
