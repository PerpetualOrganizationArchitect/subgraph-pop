    network: base-sepolia
    source:
      abi: GovernanceFactory
      address: "0xc31D11096Ad61659EA962dde209C0b0a77B50877"
      startBlock: 39524446
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - GovernanceModule
      abis:
        - name: GovernanceFactory
          file: ./abis/GovernanceFactory.json
